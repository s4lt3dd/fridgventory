services:
  api:
    volumes: []
    environment:
      DEBUG: "false"
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: always

  frontend:
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: always

  nginx:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
