services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fridgecheck
      POSTGRES_USER: fridgecheck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fridgecheck_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fridgecheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://fridgecheck:${POSTGRES_PASSWORD:-fridgecheck_dev}@postgres:5432/fridgecheck
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEBUG: "true"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://fridgecheck:${POSTGRES_PASSWORD:-fridgecheck_dev}@postgres:5432/fridgecheck
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: builder
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost/api/v1
    ports:
      - "5173:5173"
    networks:
      - frontend
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - frontend
      - backend
    depends_on:
      - api
      - frontend

networks:
  backend:
  frontend:

volumes:
  postgres_data:
  redis_data:
