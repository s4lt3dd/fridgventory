name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write   # tag + create release
  id-token: write   # OIDC -> AWS

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version from commits
        id: version
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Get commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --oneline 2>/dev/null || git log --oneline)

          # Determine bump type from conventional commits
          MAJOR=false
          MINOR=false
          PATCH=false

          while IFS= read -r line; do
            if echo "$line" | grep -qE '(feat!|BREAKING CHANGE)'; then
              MAJOR=true
            elif echo "$line" | grep -qE '^[a-f0-9]+ feat'; then
              MINOR=true
            elif echo "$line" | grep -qE '^[a-f0-9]+ fix'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          # Parse current version
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR_V MINOR_V PATCH_V <<< "$CURRENT"

          if [ "$MAJOR" = true ]; then
            NEW_VERSION="$((MAJOR_V + 1)).0.0"
          elif [ "$MINOR" = true ]; then
            NEW_VERSION="${MAJOR_V}.$((MINOR_V + 1)).0"
          elif [ "$PATCH" = true ]; then
            NEW_VERSION="${MAJOR_V}.${MINOR_V}.$((PATCH_V + 1))"
          else
            echo "No version bump needed"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "New version: v${NEW_VERSION}"

      - name: Generate changelog
        id: changelog
        if: steps.version.outputs.released == 'true'
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            CHANGELOG=$(git log "$LATEST_TAG"..HEAD --pretty=format:"- %s (%h)" 2>/dev/null)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          # Write to file for the release body
          echo "$CHANGELOG" > /tmp/changelog.md
          echo "Generated changelog"

      - name: Create tag and release
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/changelog.md

  build-and-push:
    name: Build and Push Images to ECR
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    # Use the prod role since releases are tied to the main branch.
    # The `environment: prod` claim is required for the prod role's trust policy
    # to allow AssumeRoleWithWebIdentity. Approval requirements (if configured
    # on the prod environment in repo settings) will gate this job too — that's
    # intentional: don't bake a versioned prod image without an approver.
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-api:${{ needs.release.outputs.version }}
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-worker:${{ needs.release.outputs.version }}
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Note: no frontend image build. The frontend is served as static files
      # from S3+CloudFront (Phase 3 in deploy.yml handles that path).
