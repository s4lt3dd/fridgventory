name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install ruff and mypy
        run: pip install ruff==0.4.4 mypy==1.10.0
      - name: Ruff lint
        run: ruff check backend/
      - name: Ruff format check
        run: ruff format --check backend/
      - name: mypy type check
        run: mypy backend/app/
        continue-on-error: true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint
      - name: Prettier check
        run: cd frontend && npm run format:check

  lint-terraform:
    name: Lint Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/
      - name: Terraform validate (dev)
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/api/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/worker/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/frontend/Dockerfile

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        run: |
          pip install pip-audit
          cd backend && pip-audit --desc || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high || true

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fridgecheck_test
          POSTGRES_USER: fridgecheck
          POSTGRES_PASSWORD: fridgecheck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://fridgecheck:fridgecheck_test@localhost:5432/fridgecheck_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-fail-under=55 -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests with coverage
        run: cd frontend && npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - name: Build API for scanning
        run: docker build -t fridgecheck-api:scan -f docker/api/Dockerfile .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "fridgecheck-api:scan"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
