name: Deploy

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: cd terraform/environments/dev && terraform init

      - name: Terraform Plan
        run: |
          cd terraform/environments/dev
          terraform plan \
            -var="api_image=ghcr.io/${{ github.repository }}/api:${{ github.event.release.tag_name }}" \
            -var="worker_image=ghcr.io/${{ github.repository }}/worker:${{ github.event.release.tag_name }}" \
            -var="secret_key_ssm_arn=${{ secrets.SECRET_KEY_SSM_ARN }}" \
            -out=tfplan

      - name: Terraform Apply
        run: cd terraform/environments/dev && terraform apply tfplan

      - name: Smoke Tests
        run: |
          API_URL=$(cd terraform/environments/dev && terraform output -raw api_url)
          for i in 1 2 3 4 5; do
            if curl -sf "${API_URL}/health"; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke tests failed"
          exit 1

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: cd terraform/environments/prod && terraform init

      - name: Terraform Plan
        run: |
          cd terraform/environments/prod
          terraform plan \
            -var="api_image=ghcr.io/${{ github.repository }}/api:${{ github.event.release.tag_name }}" \
            -var="worker_image=ghcr.io/${{ github.repository }}/worker:${{ github.event.release.tag_name }}" \
            -var="secret_key_ssm_arn=${{ secrets.SECRET_KEY_SSM_ARN_PROD }}" \
            -out=tfplan

      - name: Terraform Apply
        run: cd terraform/environments/prod && terraform apply tfplan

      - name: Smoke Tests
        id: smoke
        run: |
          API_URL=$(cd terraform/environments/prod && terraform output -raw api_url)
          for i in 1 2 3 4 5; do
            if curl -sf "${API_URL}/health"; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Smoke tests failed"
          exit 1

      - name: Rollback notice on failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Production smoke tests failed. Manual rollback may be required."
          echo "Consider re-deploying the previous version."
