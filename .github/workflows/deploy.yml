name: Deploy

# Push-to-dev = deploy-to-dev. Prod is gated on releases (release.yml builds
# versioned ECR images with `environment: prod`); a separate prod deploy job
# will be added once the prod GitHub Environment + AWS resources exist.

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC -> AWS
  contents: read

# Queue deploys to dev so two pushes in quick succession don't race terraform
# state or partially-overwrite ECS services. We do not cancel in-progress runs
# because that would leave migrations or service updates half-applied.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev    # required: the iam-cicd dev role's trust policy gates
                        # AssumeRoleWithWebIdentity on `environment:dev` in the
                        # OIDC token's `sub` claim.
    timeout-minutes: 60

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_DIR: terraform/environments/dev
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Phase 0: Preflight — fail fast on missing config
      # ---------------------------------------------------------------------
      # GitHub renders unset `secrets.X` / `vars.X` references as the empty
      # string rather than failing the expansion. Without this guard, an
      # empty SECRET_KEY_SSM_ARN_DEV (etc.) silently propagates and surfaces
      # 4-8 minutes later as a cryptic IAM or ECS error during Phase 2/3.
      # Bail at second 0 with a clear message instead.
      - name: Validate required secrets and variables
        env:
          AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          SECRET_KEY_SSM_ARN_DEV:  ${{ secrets.SECRET_KEY_SSM_ARN_DEV }}
          SNS_ALERT_EMAIL_DEV:     ${{ vars.SNS_ALERT_EMAIL_DEV }}
        run: |
          set -u
          fail=0

          require_secret() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "::error::Required repo secret '$name' is unset or empty. Set it under Settings -> Secrets and variables -> Actions -> Secrets."
              fail=1
            else
              echo "  $name: set (length=${#value})"
            fi
          }

          require_var() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "::error::Required repo variable '$name' is unset. Set it under Settings -> Secrets and variables -> Actions -> Variables."
              fail=1
            else
              echo "  $name: $value"
            fi
          }

          require_arn() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              return  # already reported by require_secret
            fi
            if ! [[ "$value" =~ ^arn:aws: ]]; then
              echo "::error::Repo secret '$name' does not look like an AWS ARN (must start with 'arn:aws:'). Got a value of length ${#value}."
              fail=1
            fi
          }

          echo "Required secrets:"
          require_secret AWS_DEPLOY_ROLE_ARN_DEV "$AWS_DEPLOY_ROLE_ARN_DEV"
          require_secret SECRET_KEY_SSM_ARN_DEV  "$SECRET_KEY_SSM_ARN_DEV"
          require_arn    AWS_DEPLOY_ROLE_ARN_DEV "$AWS_DEPLOY_ROLE_ARN_DEV"
          require_arn    SECRET_KEY_SSM_ARN_DEV  "$SECRET_KEY_SSM_ARN_DEV"

          echo "Required variables:"
          require_var AWS_REGION "$AWS_REGION"

          echo "Optional variables:"
          if [ -z "$SNS_ALERT_EMAIL_DEV" ]; then
            echo "  SNS_ALERT_EMAIL_DEV: unset (CloudWatch alarm emails disabled in dev)"
          else
            echo "  SNS_ALERT_EMAIL_DEV: $SNS_ALERT_EMAIL_DEV"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::Preflight failed. Fix the missing/invalid config above and re-run."
            exit 1
          fi
          echo "Preflight OK."

      # ---------------------------------------------------------------------
      # Phase 1: Auth + image build/push
      # ---------------------------------------------------------------------

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-api:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-api:dev-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-worker:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/fridgecheck-worker:dev-latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Compose image URIs
        id: images
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "api_image=${REGISTRY}/fridgecheck-api:${IMAGE_TAG}"       >> "$GITHUB_OUTPUT"
          echo "worker_image=${REGISTRY}/fridgecheck-worker:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # Phase 2: Terraform — apply infra with the new image tags
      # ---------------------------------------------------------------------

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false   # we want raw stdout from `terraform output`

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        # `sns_alert_email` defaults to "" if the repo var is unset, which
        # disables the email subscription via count. If you want CloudWatch
        # alarm emails in dev, set the `SNS_ALERT_EMAIL_DEV` repo variable.
        run: |
          terraform plan -input=false \
            -var="api_image=${{ steps.images.outputs.api_image }}" \
            -var="worker_image=${{ steps.images.outputs.worker_image }}" \
            -var="secret_key_ssm_arn=${{ secrets.SECRET_KEY_SSM_ARN_DEV }}" \
            -var="sns_alert_email=${{ vars.SNS_ALERT_EMAIL_DEV }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          {
            echo "ecs_cluster=$(terraform output -raw ecs_cluster)"
            echo "private_subnet_ids=$(terraform output -json private_subnet_ids | jq -r 'join(",")')"
            echo "api_security_group_id=$(terraform output -raw api_security_group_id)"
            echo "frontend_bucket_name=$(terraform output -raw frontend_bucket_name)"
            echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "frontend_url=$(terraform output -raw frontend_url)"
          } >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # Phase 3: Run alembic migrations (one-shot ECS task)
      # ---------------------------------------------------------------------
      # We override the api task definition's command. The api family already
      # has DATABASE_URL in its environment + the right SG/subnets for RDS,
      # so we just swap the entrypoint command. Using the family name (no
      # revision) makes ECS pick the latest revision automatically.

      - name: Run database migrations
        env:
          CLUSTER: ${{ steps.tf.outputs.ecs_cluster }}
          SUBNETS: ${{ steps.tf.outputs.private_subnet_ids }}
          SG: ${{ steps.tf.outputs.api_security_group_id }}
        run: |
          set -euo pipefail

          OVERRIDES=$(jq -nc '{
            containerOverrides: [
              { name: "api", command: ["alembic", "upgrade", "head"] }
            ]
          }')

          NETWORK=$(jq -nc --arg subnets "$SUBNETS" --arg sg "$SG" '{
            awsvpcConfiguration: {
              subnets: ($subnets | split(",")),
              securityGroups: [$sg],
              assignPublicIp: "DISABLED"
            }
          }')

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --task-definition "fridgecheck-dev-api" \
            --network-configuration "$NETWORK" \
            --overrides "$OVERRIDES" \
            --started-by "gha-${IMAGE_TAG:0:7}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"

          # 100 attempts × 6s = 10 min ceiling.
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          STOPPED_REASON=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' --output text)

          echo "Migration exit code: $EXIT_CODE"
          echo "Stopped reason: $STOPPED_REASON"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Database migration failed (exit $EXIT_CODE). Logs in /aws/ecs/fridgecheck-dev/api."
            exit 1
          fi

      # ---------------------------------------------------------------------
      # Phase 4: Roll ECS services to the new image
      # ---------------------------------------------------------------------
      # Terraform updated the task definition; --force-new-deployment makes
      # the service pick up the latest revision and drain old tasks.

      - name: Force new deployment of api + worker services
        env:
          CLUSTER: ${{ steps.tf.outputs.ecs_cluster }}
        run: |
          set -euo pipefail
          aws ecs update-service --cluster "$CLUSTER" --service "fridgecheck-dev-api"    --force-new-deployment > /dev/null
          aws ecs update-service --cluster "$CLUSTER" --service "fridgecheck-dev-worker" --force-new-deployment > /dev/null

      - name: Wait for services to stabilise
        env:
          CLUSTER: ${{ steps.tf.outputs.ecs_cluster }}
          # 25 min ceiling. The built-in `aws ecs wait services-stable` is
          # only 10 min (40 attempts × 15s) which is too tight for first
          # deploys: cold ECR pull + container startup + ECS healthcheck
          # startPeriod + ALB registration + old-task drain on force-new
          # routinely add up to 12-15 min. Custom loop also gives us
          # visibility into rollout progression and surfaces aws-cli errors
          # instead of an opaque waiter timeout.
          DEADLINE_SECONDS: "1500"
        # Note: we deliberately disable `-e` for this step. GitHub Actions
        # runs bash with `-eo pipefail` by default, but under -e any non-zero
        # exit from a transient `aws` call (throttling, brief network blip)
        # or from `read` reaching EOF kills the whole step instead of being
        # retried on the next loop iteration. We check rc explicitly instead.
        run: |
          set +e
          set -uo pipefail
          SERVICES=(fridgecheck-dev-api fridgecheck-dev-worker)
          end=$((SECONDS + DEADLINE_SECONDS))
          consecutive_errors=0

          # Query each service individually so a per-service error doesn't
          # contaminate the whole batch, and we can identify which one failed.
          probe_service() {
            local service="$1"
            local out rc
            out=$(aws ecs describe-services \
                    --cluster "$CLUSTER" --services "$service" \
                    --query 'services[0].[deployments[0].rolloutState || `NONE`, runningCount, desiredCount, length(deployments)]' \
                    --output text 2>&1)
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "AWS_ERROR rc=$rc $out"
              return $rc
            fi
            echo "$out"
          }

          while [ $SECONDS -lt $end ]; do
            api_line=$(probe_service "${SERVICES[0]}") ; api_rc=$?
            wkr_line=$(probe_service "${SERVICES[1]}") ; wkr_rc=$?

            if [ $api_rc -ne 0 ] || [ $wkr_rc -ne 0 ]; then
              echo "$(date -u +%H:%M:%S)  aws describe-services failed; api: $api_line ; worker: $wkr_line"
              consecutive_errors=$((consecutive_errors + 1))
              if [ $consecutive_errors -ge 5 ]; then
                echo "::error::aws describe-services failed 5 times in a row; aborting."
                exit 1
              fi
              sleep 20
              continue
            fi
            consecutive_errors=0

            # Each line is TAB-separated: STATE  RUNNING  DESIRED  DEPLOYMENTS
            read -r api_state api_running api_desired api_deployments <<<"$api_line"
            read -r wkr_state wkr_running wkr_desired wkr_deployments <<<"$wkr_line"

            printf '%s  api: state=%s running=%s/%s deployments=%s | worker: state=%s running=%s/%s deployments=%s\n' \
              "$(date -u +%H:%M:%S)" \
              "${api_state:-?}" "${api_running:-?}" "${api_desired:-?}" "${api_deployments:-?}" \
              "${wkr_state:-?}" "${wkr_running:-?}" "${wkr_desired:-?}" "${wkr_deployments:-?}"

            if [ "$api_state" = "FAILED" ] || [ "$wkr_state" = "FAILED" ]; then
              echo "::error::A service deployment FAILED. Recent events:"
              aws ecs describe-services --cluster "$CLUSTER" --services "${SERVICES[@]}" \
                --query 'services[].{name:serviceName, events:events[0:5].[createdAt,message]}' \
                --output table || true
              exit 1
            fi

            if [ "$api_state" = "COMPLETED" ] && [ "$wkr_state" = "COMPLETED" ] \
               && [ "$api_deployments" = "1" ] && [ "$wkr_deployments" = "1" ] \
               && [ "$api_running" = "$api_desired" ] && [ "$wkr_running" = "$wkr_desired" ]; then
              echo "Both services stable."
              exit 0
            fi

            sleep 20
          done

          echo "::error::Services did not stabilise within $((DEADLINE_SECONDS / 60)) minutes."
          aws ecs describe-services --cluster "$CLUSTER" --services "${SERVICES[@]}" \
            --query 'services[].{name:serviceName, events:events[0:5].[createdAt,message]}' \
            --output table || true
          exit 1

      # ---------------------------------------------------------------------
      # Phase 5: Build + deploy frontend (S3 + CloudFront invalidation)
      # ---------------------------------------------------------------------

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # CloudFront routes /api/* to the ALB; the SPA hits relative URLs.
          VITE_API_URL: /api/v1
        run: npm run build

      - name: Sync frontend to S3
        env:
          BUCKET: ${{ steps.tf.outputs.frontend_bucket_name }}
        run: |
          set -euo pipefail
          # Pass 1: hashed assets — long-lived immutable cache.
          aws s3 sync frontend/dist "s3://$BUCKET/" \
            --delete \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"

          # Pass 2: index.html + service-worker-style files — never cache.
          # These point at the hashed assets above, so they MUST be re-fetched
          # on every visit or users get a stale shell pointing at a deleted JS bundle.
          aws s3 sync frontend/dist "s3://$BUCKET/" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ steps.tf.outputs.cloudfront_distribution_id }}
        run: |
          set -euo pipefail
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "Invalidation: $INVALIDATION_ID"
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DIST_ID" \
            --id "$INVALIDATION_ID"

      # ---------------------------------------------------------------------
      # Phase 6: Smoke test through CloudFront (the real user path)
      # ---------------------------------------------------------------------
      # /health is mounted at the API root and is NOT exposed via CloudFront
      # (CF only routes /api/* to the ALB). We hit /api/openapi.json which
      # FastAPI serves under the /api prefix in this app.

      - name: Smoke test
        env:
          FRONTEND_URL: ${{ steps.tf.outputs.frontend_url }}
        run: |
          set -euo pipefail

          probe() {
            local url="$1"
            local label="$2"
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
              if [ "$code" = "200" ]; then
                echo "[$label] OK ($url)"
                return 0
              fi
              echo "[$label] attempt $i got HTTP $code, retrying in 15s..."
              sleep 15
            done
            echo "::error::[$label] never returned 200 ($url)"
            return 1
          }

          probe "$FRONTEND_URL/"                  "frontend"
          probe "$FRONTEND_URL/api/openapi.json"  "api"

      - name: Deployment summary
        if: always()
        env:
          FRONTEND_URL: ${{ steps.tf.outputs.frontend_url }}
        run: |
          {
            echo "## Dev deployment — \`${IMAGE_TAG:0:7}\`"
            echo ""
            echo "- Frontend: $FRONTEND_URL"
            echo "- API image: \`${{ steps.images.outputs.api_image }}\`"
            echo "- Worker image: \`${{ steps.images.outputs.worker_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
